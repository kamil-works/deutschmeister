services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # SQLite DB kalıcı — container silinse bile veri gitmez
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
